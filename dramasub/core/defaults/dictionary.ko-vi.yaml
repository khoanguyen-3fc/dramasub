# dramasub default dictionary — K-drama, Korean -> Vietnamese
# version: 3 — built by mining parallel ko/vi drama corpora for universal
#              terms, then PRUNING with the target model itself: an entry is
#              kept only if the model mistranslates the term unaided — a
#              scrambled workplace rank, a literal kinship pronoun, a calqued
#              idiom, a false friend (미팅 = group blind date, not a meeting),
#              a flattened register/euphemism, or a culture-specific gap.
#              Everyday vocabulary the model already handles was dropped,
#              leaving a small high-signal set. Show-specific names, places,
#              and product coinages were excluded; examples use placeholders.
# version: 2 — expanded with universal, show-agnostic K-drama vocabulary:
#              harsh address/insults (a model rendered 이놈아 as the flat
#              "đồ này" instead of a natural "thằng ranh này"), high-frequency
#              interjections/discourse, common drama tropes, and everyday
#              workplace/food terms. All entries are genre-generic, not tied
#              to any one show.
# version: 1 — mined from three parallel KO/VI drama corpora (an office
#              romance, an official producer subtitle, a revenge drama);
#              conflicts resolved toward the official sub, English-pivot
#              artifacts excluded. Merged UNDER each project's bible glossary
#              (the bible wins per term) and filtered per chunk; guides
#              generation but is NOT enforced by QC.
version: 3
terms:
  # --- workplace titles / ranks ---
  - source: 선임
    target: trợ lý
    note: junior professional rank; title-first ("김 선임" -> "Trợ lý Kim")
  - source: 과장
    target: quản lý
    note: section chief
  - source: 책임
    target: chủ nhiệm
    note: senior/principal rank; "김 책임님" -> "Chủ nhiệm Kim"; never "Bộ trưởng"
  - source: 실장
    target: trưởng phòng
    note: office/division chief; if 부장 also appears, pick a distinct rank to keep them apart
  - source: 사장
    target: giám đốc
    note: company president; "사장님" as address -> "Giám đốc"
  # rank ladder re-added: ranks disambiguate each other, so even ranks the model
  # translates correctly in isolation are kept as context — without the neighbours
  # it scrambles an ambiguous one (e.g. 책임 came out as "Trưởng phòng")
  - source: 사원
    target: nhân viên
    note: entry-level staff; "홍길동 사원" -> "Nhân viên Hong Gil-dong"
  - source: 대리
    target: trợ lý
    note: assistant manager, near 선임's level; never "đại lý" (dealership)
  - source: 팀장
    target: trưởng nhóm
    note: team leader (office); a police squad leader is "đội trưởng"
  - source: 부장
    target: trưởng phòng
    note: department head; never "Bộ trưởng" (government minister)
  - source: 임원
    target: lãnh đạo
    note: executives; "임원 회의" -> "họp lãnh đạo"
  - source: 이사
    target: giám đốc
    note: director (board level)
  - source: 대표
    target: giám đốc
    note: CEO/company head; usable as vocative and "you"
  - source: 회장
    target: chủ tịch
    note: chairman (conglomerate); gender marker when addressing ("bà Chủ tịch")
  - source: 지사장
    target: giám đốc chi nhánh
    note: branch director
  - source: 고객님
    target: quý khách
    note: honorific customer address in service scenes
  # --- kinship / address ---
  - source: 오빠
    target: anh
    note: woman to older male / boyfriend / husband; always the pronoun, never romanized
  - source: 언니
    target: chị
    note: woman to older woman
  - source: 누나
    target: chị
    note: man to older woman; deferential 누님 adds "ạ"
  - source: 형
    target: anh
    note: man to older man; deferential 형님 -> "anh" + "ạ"
  - source: 자네
    target: con
    note: elder to junior family member; family pronoun in VI
  # --- interjections / discourse ---
  - source: 아이씨
    target: khỉ thật
    note: mild curse, softened; stronger 씨 -> "chết tiệt"
  - source: 짠
    target: cạn ly
    note: drinking toast
  - source: 수고했어
    target: làm tốt lắm
    note: superior's "good work" to a subordinate
  # --- food / culture ---
  - source: 떡
    target: bánh tteok
    note: rice cake; Korean name + classifier
  - source: 만두
    target: mandu
    note: dumpling, loanword kept
  - source: 2차
    target: tăng hai
    note: second drinking round
  # --- romance / drama ---
  - source: 맞선
    target: xem mắt
    note: arranged matchmaking date; NOT generic "hẹn hò" (dating)
  - source: 양다리
    target: bắt cá hai tay
    note: two-timing while dating; "ngoại tình" when marital
  # --- general drama vocabulary ---
  - source: 진상
    target: khách rắc rối
    note: nightmare/entitled customer
  # --- harsh address / insults (translate by force, never literal "đồ này") ---
  - source: 이놈아
    target: thằng ranh này
    note: exasperated address to a younger male (parent/elder to junior); never the flat literal "đồ này"; softer "thằng nhóc này"
  - source: 이놈
    target: thằng này
    note: an irritated "this guy"; stronger is 이 자식
  # --- spousal / lover address ---
  - source: 여보
    target: mình ơi
    note: vocative between spouses
  - source: 자기야
    target: cưng à
    note: lovers' pet name; also "em yêu"/"anh yêu"
  # --- interjections / discourse (expanded) ---
  - source: 눈치
    target: sự tinh ý
    note: reading the room; 눈치 보다 "dò xét thái độ", 눈치 없다 "vô ý"
  # --- discourse markers / interjections (v3: mined from 6-episode ko/vi corpus) ---
  - source: 아니
    target: Ơ / Ủa
    note: sentence-opening SURPRISE/objection, NOT the negation 'không' — a classic pivot error
  # --- reactions / etiquette (v3: mined from 6-episode ko/vi corpus) ---
  - source: 들어가세요
    target: về nhé / về cẩn thận
    note: farewell to someone heading home
  # --- romance (v3: mined from 6-episode ko/vi corpus) ---
  - source: 사내 연애
    target: tình công sở
    note: workplace romance — a whole genre premise
  - source: 착각
    target: tưởng bở / ngộ nhận
    note: self-delusion / misreading (착각하다); distinct from 오해 (mutual misunderstanding)
  - source: 오늘부터 1일
    target: chính thức yêu nhau từ hôm nay
    note: "iconic line: day one of a relationship; render idiomatically"
  # --- marriage / family (v3: mined from 6-episode ko/vi corpus) ---
  - source: 편들다
    target: bênh / bênh vực
    note: to take someone's side
  # --- workplace (v3: mined from 6-episode ko/vi corpus) ---
  - source: 기획
    target: kế hoạch / hoạch định
    note: planning / a planned project (기획하다); models tend to leave it untranslated
  - source: 워크숍
    target: workshop (chuyến team-building)
    note: corporate team-building trip, NOT an academic workshop
  - source: 계산하다
    target: tính tiền / thanh toán
    note: to pay the bill; not 결재 (managerial sign-off)
  - source: 미팅
    target: buổi xem mắt nhóm / hẹn hò nhóm
    note: usually a GROUP blind date; but a work 미팅 is a business meeting (= 회의, "cuộc họp") — judge by context
  # --- idioms / set phrases (v3: mined from 6-episode ko/vi corpus) ---
  - source: 두 마리 토끼
    target: được cả hai / bắt cả hai con thỏ
    note: chasing two goals at once (두 마리 토끼를 잡다/놓치다)
  - source: 숟가락 얹다
    target: ăn ké / hớt công
    note: freeload on / take credit for others' work
  - source: 눈도장 찍다
    target: ghi điểm / tạo ấn tượng
    note: get noticed by a superior, leave a good impression
  - source: 두고 보다
    target: để rồi xem / cứ chờ xem
    note: "'wait and see', as warning or suspense"
  - source: 라인 타다
    target: theo phe / theo cánh
    note: "office politics: align with a patron's faction (라인 also = product line)"
  - source: 당하다
    target: bị hại / bị chơi khăm
    note: to get done over / be on the receiving end of a scheme
  # --- crime / legal / investigation (v3, cross-show) ---
  - source: 신고하다
    target: báo (cảnh sát) / trình báo
    note: report to authorities; 실종 신고 = report someone missing
  - source: 협박하다
    target: đe dọa / tống tiền
    note: to threaten/blackmail (noun 협박)
  - source: 사주하다
    target: chủ mưu / xúi giục
    note: to instigate / mastermind a crime; 사주한 사람 = the instigator
  - source: 처리하다
    target: xử lý; thủ tiêu
    note: to handle/clean up; in a crime context = eliminate a person (euphemism)
  - source: 각오하다
    target: liệu hồn / chuẩn bị tinh thần
    note: brace yourself; imperative 각오해 = 'you'll pay for this'
  # --- money / finance (v3, cross-show) ---
  - source: 빼돌리다
    target: biển thủ / tuồn ra
    note: to siphon off / embezzle / divert secretly
  - source: 사채
    target: vay nặng lãi / tín dụng đen
    note: private / loan-shark debt; distinct from 대출 (bank loan)
  - source: 전세
    target: tiền thuê nhà đặt cọc (jeonse)
    note: Korean lump-sum lease-deposit system; 전세 사기 = jeonse-deposit fraud
  - source: 위자료
    target: tiền cấp dưỡng ly hôn
    note: divorce alimony / consolation money
  - source: 빽
    target: chỗ dựa / thế lực chống lưng
    note: backing / connections / a patron (slang, from English 'back')
  - source: 물려받다
    target: thừa kế / kế thừa
    note: to inherit a company/wealth/position; noun form is 후계자 (heir)
  # --- medical / illness (v3, cross-show) ---
  - source: 보호자
    target: người nhà / người giám hộ
    note: a patient's guardian / next-of-kin who signs and pays
  # --- family / marriage / kinship (v3, cross-show) ---
  - source: 집안
    target: gia thế / dòng dõi
    note: the household as social standing/lineage, not just 'house'
  - source: 모시다
    target: phụng dưỡng / hầu hạ
    note: honorific 'serve/attend to' elders; 제사를 모시다 = hold ancestral rites
  - source: 예물
    target: sính lễ
    note: betrothal/wedding gifts exchanged between families
  - source: 마누라
    target: bà xã
    note: colloquial/blunt 'the wife', used by husbands, mildly dismissive
  - source: 동창회
    target: buổi họp lớp
    note: a school/class reunion (동창 = former classmate); a classic confrontation setting
  # --- revenge / betrayal / confrontation (v3, cross-show) ---
  - source: 갈아타다
    target: đổi sang (cái tốt hơn)
    note: to trade up (partners/options); literally transfer transport
  - source: 독기
    target: sự nhẫn tâm / máu lạnh
    note: venomous ruthlessness; 독하다 = ruthless/tenacious
  - source: 만만하다
    target: dễ bắt nạt / dễ xơi
    note: to be a pushover; 만만치 않다 = formidable, not to be underestimated
  - source: 넘어가다
    target: cho qua / bỏ qua
    note: to let something slide; 안 넘어가 = won't let it go
  # --- morality / fate / idioms (v3, cross-show) ---
  - source: 콩밥 먹다
    target: đi tù / bóc lịch
    note: to do time in prison (slang; not literal 'eat bean rice')
  - source: 기가 차다
    target: cạn lời / hết chỗ nói
    note: dumbfounded/appalled at something absurd; near 어이가 없다
  - source: 구워삶다
    target: dụ dỗ / thuyết phục khéo
    note: to cajole / win someone over (literally roast-and-boil)
  # --- emotion / everyday (v3, cross-show) ---
  - source: 씹다
    target: ngó lơ / phớt lờ (tin nhắn)
    note: "slang: to ignore someone's words/messages"
  - source: 찐따
    target: kẻ lập dị / kẻ thất bại
    note: a loser / socially awkward outcast (derogatory slang)
  - source: 지랄
    target: giở trò / làm loạn (thô tục)
    note: vulgar 'bullshit / raising hell' (지랄하다)
  # --- discourse markers (v3, cross-show) ---
  - source: 하필
    target: sao lại nhằm
    note: "'of all times/things', usually resentful"
