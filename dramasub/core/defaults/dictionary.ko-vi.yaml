    note: luxury goods
  - source: 진상
    target: khách rắc rối
    note: nightmare/entitled customer
  - source: 위암
    target: ung thư dạ dày
    note: stomach cancer (recurring drama illness)
  - source: 대출
    target: khoản vay
    note: loan
  - source: 부동산
    target: bất động sản
    note: real estate
  - source: 신분증
    target: thẻ căn cước
    note: ID card, VN-localized
  # --- harsh address / insults (translate by force, never literal "đồ này") ---
  - source: 이놈아
    target: thằng ranh này
    note: exasperated address to a younger male (parent/elder to junior); never the flat literal "đồ này"; softer "thằng nhóc này"
  - source: 이놈
    target: thằng này
    note: an irritated "this guy"; stronger is 이 자식
  - source: 자식
    target: thằng nhóc
    note: kid/guy; affectionate with 이/우리, an insult by tone; not literally con cái
  - source: 새끼
    target: thằng khốn
    note: strong insult; soften to "thằng nhóc" only when clearly affectionate
  - source: 미친놈
    target: thằng điên
    note: crazy bastard; female target con điên
  - source: 바보
    target: đồ ngốc
    note: mild "idiot/fool", often teasing
  # --- spousal / lover address ---
  - source: 여보
    target: mình ơi
    note: vocative between spouses
  - source: 자기야
    target: cưng à
    note: lovers' pet name; also "em yêu"/"anh yêu"
  - source: 당신
    target: anh
    note: spousal "mình/anh/em"; confrontational to a stranger "ông/bà"; never literal "bạn"
  # --- interjections / discourse (expanded) ---
  - source: 대박
    target: đỉnh thật
    note: amazement "awesome"; for shock "khủng khiếp"
  - source: 헐
    target: trời đất
    note: disbelief "whoa/what"
  - source: 화이팅
    target: cố lên
    note: encouragement "fighting!"; also 파이팅
  - source: 그러게
    target: thì đấy
    note: rueful agreement "right?/tell me about it"
  - source: 어차피
    target: dù sao thì
    note: anyway / in any case
  - source: 그나저나
    target: mà này
    note: topic shift "anyway/by the way"
  - source: 됐어
    target: thôi đủ rồi
    note: enough / forget it; dismissive bỏ đi
  - source: 어쩐지
    target: thảo nào
    note: no wonder ("that explains it")
  - source: 눈치
    target: sự tinh ý
    note: reading the room; 눈치 보다 "dò xét thái độ", 눈치 없다 "vô ý"
  - source: 축하해
    target: chúc mừng
    note: congratulations; formal 축하합니다 adds "ạ"
  - source: 사랑해
    target: yêu em
    note: I love you; pick pronoun by speaker (anh yêu em / em yêu anh)
  - source: 보고 싶어
    target: nhớ em
    note: I miss you; pick pronoun by relationship
