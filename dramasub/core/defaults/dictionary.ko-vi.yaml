  # --- general drama vocabulary ---
  - source: 명품
    target: hàng hiệu
    note: luxury goods
  - source: 진상
    target: khách rắc rối
    note: nightmare/entitled customer
  - source: 위암
    target: ung thư dạ dày
    note: stomach cancer (recurring drama illness)
  - source: 대출
    target: khoản vay
    note: loan
  - source: 부동산
    target: bất động sản
    note: real estate
  - source: 신분증
    target: thẻ căn cước
    note: ID card, VN-localized
